<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Agent Framework - 流式聊天演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 16px; }
        .main { display: flex; height: calc(100vh - 200px); }
        .left-panel {
            width: 350px;
            border-right: 1px solid #e0e0e0;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        .right-panel { flex: 1; display: flex; flex-direction: column; }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        .input-area {
            border-top: 1px solid #e0e0e0;
            padding: 20px;
            background: white;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .form-group select, .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group select:focus, .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .message-header .role {
            padding: 4px 12px;
            border-radius: 12px;
            margin-right: 10px;
        }
        .role-user { background: #e3f2fd; color: #1976d2; }
        .role-assistant { background: #f3e5f5; color: #7b1fa2; }
        .role-tool { background: #fff3e0; color: #f57c00; }
        .message-content {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            word-wrap: break-word;
            line-height: 1.6;
        }
        .tool-call {
            background: #fff8e1;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            border-left: 4px solid #ffa726;
        }
        .tool-call-header {
            font-weight: 600;
            color: #f57c00;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .tool-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            display: inline-block;
        }
        .tool-result {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            border-left: 4px solid #66bb6a;
        }
        .turn-indicator {
            text-align: center;
            padding: 10px;
            color: #999;
            font-size: 14px;
            margin: 20px 0;
        }
        .turn-indicator::before,
        .turn-indicator::after {
            content: "━━━";
            margin: 0 10px;
        }
        .status {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .status-idle { background: #e8f5e9; color: #2e7d32; }
        .status-streaming { background: #fff3e0; color: #f57c00; }
        .status-error { background: #ffebee; color: #c62828; }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Markdown rendered content styles */
        .msg-text p { margin: 0.4em 0; }
        .msg-text p:first-child { margin-top: 0; }
        .msg-text p:last-child { margin-bottom: 0; }
        .msg-text pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px 14px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
            margin: 8px 0;
        }
        .msg-text code {
            background: #f0f0f0;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'SF Mono', Consolas, monospace;
        }
        .msg-text pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            color: inherit;
        }
        .msg-text ul, .msg-text ol { margin: 0.4em 0; padding-left: 1.5em; }
        .msg-text li { margin: 0.2em 0; }
        .msg-text h1, .msg-text h2, .msg-text h3, .msg-text h4 {
            margin: 0.6em 0 0.3em;
            line-height: 1.3;
        }
        .msg-text h1 { font-size: 1.3em; }
        .msg-text h2 { font-size: 1.15em; }
        .msg-text h3 { font-size: 1.05em; }
        .msg-text blockquote {
            margin: 0.4em 0;
            padding: 4px 12px;
            border-left: 3px solid #ddd;
            color: #666;
        }
        .msg-text table {
            border-collapse: collapse;
            margin: 8px 0;
            font-size: 13px;
        }
        .msg-text th, .msg-text td {
            border: 1px solid #ddd;
            padding: 6px 10px;
        }
        .msg-text th { background: #f5f5f5; font-weight: 600; }
        .msg-text hr { border: none; border-top: 1px solid #e0e0e0; margin: 8px 0; }
        .msg-text strong { font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Pi Agent Framework</h1>
            <p>流式聊天演示 - 支持任务规划与 Skills 工具调用</p>
        </div>
        <div class="main">
            <div class="left-panel">
                <div class="form-group">
                    <label>Namespace</label>
                    <input type="text" id="namespace" value="demo" placeholder="例如：demo, team-alpha">
                </div>
                <div class="form-group">
                    <label>模型提供商</label>
                    <select id="provider">
                        <option value="deepseek">DeepSeek</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>模型</label>
                    <select id="modelId">
                        <option value="deepseek-chat">deepseek-chat</option>
                        <option value="deepseek-reasoner">deepseek-reasoner</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>系统提示（可选）</label>
                    <textarea id="systemPrompt" placeholder="例如：你是一个专业的编程助手"></textarea>
                </div>
                <div class="form-group">
                    <label>执行模式</label>
                    <select id="chatMode">
                        <option value="agent">Agent 模式（直接对话）</option>
                        <option value="orchestrated">规划模式（任务分解+逐步执行）</option>
                    </select>
                    <div style="font-size:12px;color:#888;margin-top:4px;" id="modeHint">LLM 自主决定是否调用工具</div>
                </div>
                <div class="form-group">
                    <label>Session ID</label>
                    <input type="text" id="sessionId" placeholder="留空自动创建新 Session">
                    <div style="font-size:12px;color:#888;margin-top:4px;" id="sessionHint"></div>
                </div>
                <div class="form-group" style="margin-top:8px;">
                    <button class="btn" style="background:#e74c3c;padding:8px;font-size:13px;" onclick="clearSession()">清除 Session</button>
                </div>
            </div>
            <div class="right-panel">
                <div class="chat-area" id="chatArea">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                        </svg>
                        <p>输入消息开始对话</p>
                        <p style="font-size: 12px; margin-top: 10px;">支持任务规划工具自动调用</p>
                    </div>
                </div>
                <div class="input-area">
                    <div id="status" class="status status-idle">
                        <span>● 就绪</span>
                    </div>
                    <div class="form-group">
                        <textarea id="prompt" placeholder="输入你的问题...&#10;例如：帮我规划一下如何实现一个用户认证系统" rows="3"></textarea>
                    </div>
                    <button class="btn" id="sendBtn" onclick="sendMessage()">发送消息</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTurn = 0;
        let isStreaming = false;

        // Configure marked
        marked.setOptions({ breaks: true, gfm: true });

        // Debounced markdown renderer
        let _mdTimer = null;
        function renderMarkdown(el, text) {
            el.innerHTML = marked.parse(text);
        }

        // Model options mapping
        const modelOptions = {
            deepseek: [
                { value: 'deepseek-chat', label: 'deepseek-chat' },
                { value: 'deepseek-reasoner', label: 'deepseek-reasoner' }
            ]
        };

        // Initialize model dropdown on page load
        function updateModelDropdown() {
            const provider = document.getElementById('provider').value;
            const modelSelect = document.getElementById('modelId');
            modelSelect.innerHTML = '';
            modelOptions[provider].forEach(opt => {
                const option = document.createElement('option');
                option.value = opt.value;
                option.textContent = opt.label;
                modelSelect.appendChild(option);
            });
        }

        document.getElementById('provider').addEventListener('change', updateModelDropdown);

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', updateModelDropdown);

        function setStatus(text, type = 'idle') {
            const status = document.getElementById('status');
            status.className = `status status-${type}`;
            if (type === 'streaming') {
                status.innerHTML = `<div class="spinner"></div><span>${text}</span>`;
            } else {
                status.innerHTML = `<span>${text}</span>`;
            }
        }

        function addMessage(role, content, type = 'text') {
            const chatArea = document.getElementById('chatArea');
            const empty = chatArea.querySelector('.empty-state');
            if (empty) empty.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';

            const roleClass = `role-${role}`;
            const roleLabel = role === 'user' ? '👤 用户' : role === 'assistant' ? '🤖 助手' : '🔧 工具';

            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="role ${roleClass}">${roleLabel}</span>
                </div>
                <div class="message-content" id="msg-${Date.now()}">${content}</div>
            `;

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return messageDiv.querySelector('.message-content');
        }

        function addToolCall(toolName, toolCallId) {
            const chatArea = document.getElementById('chatArea');
            const toolDiv = document.createElement('div');
            toolDiv.className = 'tool-call message';
            toolDiv.id = `tool-${CSS.escape(toolCallId)}`;
            toolDiv.innerHTML = `
                <div class="tool-call-header">
                    <span class="tool-icon">🔧</span>
                    <span>调用工具: <strong>${toolName}</strong></span>
                </div>
                <div style="font-size: 13px; color: #666; margin-top: 5px;">
                    <div class="spinner" style="display:inline-block;vertical-align:middle;margin-right:6px"></div>执行中...
                </div>
            `;
            chatArea.appendChild(toolDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return toolDiv;
        }

        function updateToolResult(toolCallId, result, isError, toolName) {
            const toolDiv = document.getElementById(`tool-${CSS.escape(toolCallId)}`);
            const displayName = toolName || 'unknown';
            if (toolDiv) {
                toolDiv.className = (isError ? 'tool-call' : 'tool-result') + ' message';
                toolDiv.innerHTML = `
                    <div class="tool-call-header">
                        <span class="tool-icon">${isError ? '❌' : '✅'}</span>
                        <span>${isError ? '工具执行失败' : '工具执行完成'}: <strong>${escapeHtml(displayName)}</strong></span>
                    </div>
                    <div style="font-size: 13px; margin-top: 8px; white-space: pre-wrap; max-height: 300px; overflow-y: auto;">${escapeHtml(result)}</div>
                `;
                document.getElementById('chatArea').scrollTop =
                    document.getElementById('chatArea').scrollHeight;
            } else {
                // Fallback: tool_start was missed, create the result directly
                const chatArea = document.getElementById('chatArea');
                const toolDiv = document.createElement('div');
                toolDiv.className = (isError ? 'tool-call' : 'tool-result') + ' message';
                toolDiv.innerHTML = `
                    <div class="tool-call-header">
                        <span class="tool-icon">${isError ? '❌' : '✅'}</span>
                        <span>${isError ? '工具执行失败' : '工具执行完成'}: <strong>${escapeHtml(displayName)}</strong></span>
                    </div>
                    <div style="font-size: 13px; margin-top: 8px; white-space: pre-wrap; max-height: 300px; overflow-y: auto;">${escapeHtml(result)}</div>
                `;
                chatArea.appendChild(toolDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function addTurnIndicator() {
            currentTurn++;
            const chatArea = document.getElementById('chatArea');
            const turnDiv = document.createElement('div');
            turnDiv.className = 'turn-indicator';
            turnDiv.textContent = `Turn ${currentTurn}`;
            chatArea.appendChild(turnDiv);
        }

        async function sendMessage() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt || isStreaming) return;

            const namespace = document.getElementById('namespace').value.trim();
            const provider = document.getElementById('provider').value;
            const modelId = document.getElementById('modelId').value;
            const systemPrompt = document.getElementById('systemPrompt').value.trim();
            const mode = document.getElementById('chatMode').value;
            const sessionId = document.getElementById('sessionId').value.trim() || null;

            if (!namespace) {
                alert('请输入 Namespace');
                return;
            }

            addMessage('user', prompt);
            document.getElementById('prompt').value = '';

            isStreaming = true;
            document.getElementById('sendBtn').disabled = true;
            setStatus(mode === 'orchestrated' ? '规划模式处理中...' : '处理中...', 'streaming');

            let currentMessageContent = null;
            let currentText = '';
            let isOrchestrated = (mode === 'orchestrated');

            try {
                const requestBody = {
                    namespace,
                    prompt,
                    provider,
                    modelId,
                    systemPrompt: systemPrompt || null,
                    sessionId,
                    mode: mode === 'orchestrated' ? 'orchestrated' : null
                };

                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    let boundary;
                    while ((boundary = buffer.indexOf('\n\n')) !== -1) {
                        const frame = buffer.substring(0, boundary);
                        buffer = buffer.substring(boundary + 2);

                        let dataStr = null;
                        for (const line of frame.split('\n')) {
                            if (line.startsWith('data:')) {
                                dataStr = line.substring(5);
                            }
                        }
                        if (!dataStr || !dataStr.trim()) continue;

                        let data;
                        try {
                            data = JSON.parse(dataStr);
                        } catch (e) {
                            console.warn('JSON parse skip:', dataStr);
                            continue;
                        }

                        handleEvent(data);
                    }
                }

                if (buffer.trim()) {
                    for (const line of buffer.split('\n')) {
                        if (line.startsWith('data:')) {
                            try {
                                handleEvent(JSON.parse(line.substring(5)));
                            } catch (e) { /* ignore */ }
                        }
                    }
                }
            } catch (error) {
                setStatus('错误: ' + error.message, 'error');
                addMessage('assistant', '发生了错误：' + error.message);
            } finally {
                isStreaming = false;
                document.getElementById('sendBtn').disabled = false;
                if (document.getElementById('status').className.includes('streaming')) {
                    setStatus('完成', 'idle');
                }
            }

            function handleEvent(data) {
                console.log('SSE event:', data.type, data);
                const chatArea = document.getElementById('chatArea');
                switch (data.type) {
                    case 'session_created':
                        if (data.sessionId) {
                            document.getElementById('sessionId').value = data.sessionId;
                            document.getElementById('sessionHint').textContent = '已自动创建';
                        }
                        break;
                    case 'turn_start':
                        addTurnIndicator();
                        break;
                    case 'message_start':
                        if (data.role === 'assistant') {
                            currentMessageContent = addMessage('assistant', '');
                            currentText = '';
                        }
                        break;
                    case 'text':
                        // In orchestrated mode, skip text events - output is shown in step_output
                        if (isOrchestrated) break;
                        currentText += data.delta;
                        if (currentMessageContent) {
                            let textNode = currentMessageContent.querySelector('.msg-text');
                            if (!textNode) {
                                textNode = document.createElement('div');
                                textNode.className = 'msg-text';
                                currentMessageContent.appendChild(textNode);
                            }
                            renderMarkdown(textNode, currentText);
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }
                        break;
                    case 'tool_start':
                        // Skip rendering for tools called within plan steps (they have stepId)
                        if (data.stepId || data.phase === 'planning') break;
                        if (currentMessageContent) {
                            const toolDiv = document.createElement('div');
                            toolDiv.id = 'inline-tool-' + CSS.escape(data.toolCallId);
                            toolDiv.style.cssText = 'margin:8px 0;padding:8px 10px;background:#fff8e1;border-radius:8px;border-left:3px solid #ffa726;font-size:13px;';
                            toolDiv.innerHTML = `<span style="color:#f57c00;">🔧 调用工具: <strong>${escapeHtml(data.toolName)}</strong></span> <span class="tool-spinner" style="color:#999;font-size:12px;">执行中...</span>`;
                            currentMessageContent.appendChild(toolDiv);
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }
                        break;
                    case 'tool_end': {
                        // Skip rendering for tools called within plan steps
                        if (data.stepId || data.phase === 'planning') break;
                        const toolDiv = document.getElementById('inline-tool-' + CSS.escape(data.toolCallId));
                        if (toolDiv) {
                            const icon = data.isError ? '❌' : '✅';
                            const label = data.isError ? '工具执行失败' : '工具执行完成';
                            toolDiv.style.background = data.isError ? '#ffebee' : '#e8f5e9';
                            toolDiv.style.borderLeftColor = data.isError ? '#e53935' : '#43a047';
                            toolDiv.innerHTML = `<span style="color:${data.isError ? '#c62828' : '#2e7d32'};">${icon} ${label}: <strong>${escapeHtml(data.toolName || '')}</strong></span>`;
                        }
                        chatArea.scrollTop = chatArea.scrollHeight;
                        break;
                    }
                    case 'planning_started':
                        setStatus('正在生成执行计划...', 'streaming');
                        break;
                    case 'planning_progress':
                        setStatus(data.message || '规划中...', 'streaming');
                        break;
                    case 'planning_completed':
                        setStatus('计划生成完成，开始执行', 'streaming');
                        if (data.steps && currentMessageContent) {
                            const planDiv = document.createElement('div');
                            planDiv.className = 'execution-plan';
                            planDiv.style.cssText = 'margin:10px 0;padding:10px 12px;background:#f5f7ff;border-radius:8px;border-left:3px solid #667eea;font-size:13px;';

                            // Create header
                            const headerDiv = document.createElement('div');
                            headerDiv.style.cssText = 'font-weight:600;color:#3f51b5;margin-bottom:10px;';
                            headerDiv.textContent = '📋 执行计划：' + (data.goal || '');
                            planDiv.appendChild(headerDiv);

                            // Create step items with output containers
                            (data.steps || []).forEach((s, i) => {
                                const stepContainer = document.createElement('div');
                                stepContainer.className = 'plan-step-container';
                                stepContainer.dataset.stepIndex = i + 1;
                                stepContainer.style.cssText = 'margin-bottom:8px;';

                                const stepHeader = document.createElement('div');
                                stepHeader.className = 'plan-step-header';
                                stepHeader.style.cssText = 'padding:6px 8px;background:#f8f9fa;border-radius:6px;border-left:3px solid #ccc;';
                                stepHeader.innerHTML = `<span style="color:#999;font-weight:600;">${i+1}.</span> ${escapeHtml(s.title || s.description || '')} <span style="color:#999;font-size:11px;margin-left:6px;">[${s.executorType || 'AGENT'}]</span>`;

                                const stepOutput = document.createElement('div');
                                stepOutput.className = 'plan-step-output';
                                stepOutput.dataset.stepIndex = i + 1;
                                stepOutput.style.cssText = 'margin-left:20px;margin-top:4px;display:none;';

                                stepContainer.appendChild(stepHeader);
                                stepContainer.appendChild(stepOutput);
                                planDiv.appendChild(stepContainer);
                            });

                            currentMessageContent.appendChild(planDiv);
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }
                        break;
                    case 'execution_started':
                        setStatus(`执行中 (0/${data.totalSteps || '?'})`, 'streaming');
                        break;
                    case 'step_started': {
                        setStatus(`[${data.index}/${data.total}] ${data.title}`, 'streaming');
                        // Activate the corresponding plan step header (turn green with spinner)
                        if (currentMessageContent) {
                            const container = currentMessageContent.querySelector(`.plan-step-container[data-step-index="${data.index}"]`);
                            if (container) {
                                const header = container.querySelector('.plan-step-header');
                                if (header) {
                                    header.style.background = '#e8f5e9';
                                    header.style.borderLeftColor = '#43a047';
                                    header.innerHTML = `<div class="spinner" style="display:inline-block;vertical-align:middle;margin-right:6px;width:12px;height:12px;border-width:2px;"></div><span style="color:#2e7d32;font-weight:600;">${data.index}.</span> ${escapeHtml(data.title)} <span style="color:#999;font-size:11px;margin-left:6px;">执行中</span>`;
                                }
                                // Show and reset the output area
                                const output = container.querySelector('.plan-step-output');
                                if (output) {
                                    output.style.display = 'block';
                                    output.innerHTML = '';
                                }
                            }
                            // Reset currentText for this step
                            currentText = '';
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }
                        break;
                    }
                    case 'step_output': {
                        currentText += data.delta;
                        if (currentMessageContent) {
                            // Find the active step's output container
                            const containers = currentMessageContent.querySelectorAll('.plan-step-output[style*="display: block"], .plan-step-output[style*="display:block"]');
                            const activeOutput = containers[containers.length - 1];
                            if (activeOutput) {
                                let textNode = activeOutput.querySelector('.msg-text');
                                if (!textNode) {
                                    textNode = document.createElement('div');
                                    textNode.className = 'msg-text';
                                    textNode.style.cssText = 'font-size:13px;line-height:1.6;padding:8px;background:#fff;border-radius:6px;border:1px solid #e8e8e8;';
                                    activeOutput.appendChild(textNode);
                                }
                                renderMarkdown(textNode, currentText);
                            }
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }
                        break;
                    }
                    case 'step_completed': {
                        if (currentMessageContent && data.stepId) {
                            // Find step by matching the last active container
                            const containers = currentMessageContent.querySelectorAll('.plan-step-container');
                            for (const container of containers) {
                                const header = container.querySelector('.plan-step-header');
                                if (header && header.querySelector('.spinner')) {
                                    const spinner = header.querySelector('.spinner');
                                    spinner.outerHTML = '✅ ';
                                    const statusSpan = header.querySelector('span:last-child');
                                    if (statusSpan && statusSpan.textContent === '执行中') {
                                        statusSpan.textContent = '已完成';
                                        statusSpan.style.color = '#2e7d32';
                                    }
                                }
                            }
                        }
                        break;
                    }
                    case 'step_failed': {
                        if (currentMessageContent) {
                            const containers = currentMessageContent.querySelectorAll('.plan-step-container');
                            for (const container of containers) {
                                const header = container.querySelector('.plan-step-header');
                                if (header && header.querySelector('.spinner')) {
                                    header.style.background = '#ffebee';
                                    header.style.borderLeftColor = '#e53935';
                                    const spinner = header.querySelector('.spinner');
                                    spinner.outerHTML = '❌ ';
                                    const statusSpan = header.querySelector('span:last-child');
                                    if (statusSpan && statusSpan.textContent === '执行中') {
                                        statusSpan.textContent = '失败';
                                        statusSpan.style.color = '#c62828';
                                    }
                                    if (data.error) {
                                        const output = container.querySelector('.plan-step-output');
                                        if (output) {
                                            output.style.display = 'block';
                                            output.innerHTML += `<div style="color:#c62828;font-size:12px;margin-top:4px;padding:6px 8px;background:#ffebee;border-radius:4px;">${escapeHtml(data.error)}</div>`;
                                        }
                                    }
                                }
                            }
                        }
                        break;
                    }
                    case 'ack':
                        setStatus('命令已执行: ' + (data.command || ''), 'idle');
                        break;
                    case 'message_end':
                        break;
                    case 'done':
                        setStatus('完成', 'idle');
                        isStreaming = false;
                        document.getElementById('sendBtn').disabled = false;
                        break;
                    case 'error':
                        setStatus('错误: ' + (data.message || 'unknown'), 'error');
                        isStreaming = false;
                        document.getElementById('sendBtn').disabled = false;
                        break;
                }
            }
        }

        function clearSession() {
            document.getElementById('sessionId').value = '';
            document.getElementById('sessionHint').textContent = '';
            document.getElementById('chatArea').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                    </svg>
                    <p>输入消息开始对话</p>
                </div>`;
            setStatus('就绪', 'idle');
        }

        // Mode hint update
        document.getElementById('chatMode').addEventListener('change', function() {
            const hint = document.getElementById('modeHint');
            hint.textContent = this.value === 'orchestrated'
                ? '先生成结构化计划，再逐步执行'
                : 'LLM 自主决定是否调用工具';
        });

        // Enter to send
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
