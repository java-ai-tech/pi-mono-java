<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Agent Framework - 流式聊天演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 16px; }
        .main { display: flex; height: calc(100vh - 200px); }
        .left-panel {
            width: 350px;
            border-right: 1px solid #e0e0e0;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        .right-panel { flex: 1; display: flex; flex-direction: column; }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        .input-area {
            border-top: 1px solid #e0e0e0;
            padding: 20px;
            background: white;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .form-group select, .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group select:focus, .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .message-header .role {
            padding: 4px 12px;
            border-radius: 12px;
            margin-right: 10px;
        }
        .role-user { background: #e3f2fd; color: #1976d2; }
        .role-assistant { background: #f3e5f5; color: #7b1fa2; }
        .role-tool { background: #fff3e0; color: #f57c00; }
        .role-system { background: #eceff1; color: #455a64; }
        .message-content {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            word-wrap: break-word;
            line-height: 1.6;
        }
        .status {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .status-idle { background: #e8f5e9; color: #2e7d32; }
        .status-streaming { background: #fff3e0; color: #f57c00; }
        .status-error { background: #ffebee; color: #c62828; }
        .status-queued { background: #e3f2fd; color: #1565c0; }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        /* Inline tool / subagent cards */
        .inline-card {
            margin: 8px 0;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            border-left: 3px solid #ccc;
            background: #f8f9fa;
        }
        .inline-card.tool { background: #fff8e1; border-left-color: #ffa726; }
        .inline-card.tool.success { background: #e8f5e9; border-left-color: #43a047; }
        .inline-card.tool.error { background: #ffebee; border-left-color: #e53935; }
        .inline-card.subagent { background: #ede7f6; border-left-color: #7e57c2; }
        .inline-card.subagent.success { background: #e0f2f1; border-left-color: #26a69a; }
        .inline-card.subagent.error { background: #ffebee; border-left-color: #e53935; }
        .inline-card-header {
            display: flex;
            align-items: center;
            font-weight: 600;
            color: #333;
        }
        .inline-card-header .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            background: rgba(0,0,0,0.08);
            color: #555;
            font-weight: 500;
        }
        .inline-card-body {
            margin-top: 6px;
            color: #555;
            white-space: pre-wrap;
            max-height: 280px;
            overflow-y: auto;
            font-size: 12.5px;
        }
        .turn-indicator {
            text-align: center;
            padding: 10px;
            color: #999;
            font-size: 14px;
            margin: 20px 0;
        }
        .turn-indicator::before,
        .turn-indicator::after {
            content: "━━━";
            margin: 0 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Markdown rendered content styles */
        .msg-text p { margin: 0.4em 0; }
        .msg-text p:first-child { margin-top: 0; }
        .msg-text p:last-child { margin-bottom: 0; }
        .msg-text pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px 14px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
            margin: 8px 0;
        }
        .msg-text code {
            background: #f0f0f0;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'SF Mono', Consolas, monospace;
        }
        .msg-text pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            color: inherit;
        }
        .msg-text ul, .msg-text ol { margin: 0.4em 0; padding-left: 1.5em; }
        .msg-text li { margin: 0.2em 0; }
        .msg-text h1, .msg-text h2, .msg-text h3, .msg-text h4 {
            margin: 0.6em 0 0.3em;
            line-height: 1.3;
        }
        .msg-text h1 { font-size: 1.3em; }
        .msg-text h2 { font-size: 1.15em; }
        .msg-text h3 { font-size: 1.05em; }
        .msg-text blockquote {
            margin: 0.4em 0;
            padding: 4px 12px;
            border-left: 3px solid #ddd;
            color: #666;
        }
        .msg-text table {
            border-collapse: collapse;
            margin: 8px 0;
            font-size: 13px;
        }
        .msg-text th, .msg-text td {
            border: 1px solid #ddd;
            padding: 6px 10px;
        }
        .msg-text th { background: #f5f5f5; font-weight: 600; }
        .msg-text hr { border: none; border-top: 1px solid #e0e0e0; margin: 8px 0; }
        .msg-text strong { font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Pi Agent Framework</h1>
            <p>流式聊天演示 - 队列控制 / 工具调用 / Subagent 编排</p>
        </div>
        <div class="main">
            <div class="left-panel">
                <div class="form-group">
                    <label>Namespace</label>
                    <input type="text" id="namespace" value="demo" placeholder="例如：demo, team-alpha">
                </div>
                <div class="form-group">
                    <label>Tenant ID（HTTP Header，必须等于 Namespace）</label>
                    <input type="text" id="tenantId" placeholder="留空则自动使用 Namespace">
                </div>
                <div class="form-group">
                    <label>User ID（HTTP Header，必填）</label>
                    <input type="text" id="userId" value="demo-user" placeholder="审计 / 计量用">
                </div>
                <div class="form-group">
                    <label>Project Key（可选）</label>
                    <input type="text" id="projectKey" placeholder="subagent project 作用域时使用">
                </div>
                <div class="form-group">
                    <label>模型提供商</label>
                    <select id="provider">
                        <option value="deepseek">DeepSeek</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>模型</label>
                    <select id="modelId">
                        <option value="deepseek-v4-pro">deepseek-v4-pro</option>
                        <option value="deepseek-v4-flash">deepseek-v4-flash</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>队列策略 (queueMode)</label>
                    <select id="queueMode">
                        <option value="interrupt">interrupt（中断当前 run）</option>
                        <option value="followup">followup（排队执行）</option>
                        <option value="steer">steer（注入到当前 run）</option>
                        <option value="drop">drop（有 run 时丢弃）</option>
                        <option value="reject">reject（有 run 时拒绝）</option>
                    </select>
                    <div style="font-size:12px;color:#888;margin-top:4px;" id="queueHint">中断当前 run，立即开始新 run</div>
                </div>
                <div class="form-group">
                    <label>系统提示（可选，仅创建新 session 时生效）</label>
                    <textarea id="systemPrompt" placeholder="例如：你是一个专业的编程助手"></textarea>
                </div>
                <div class="form-group">
                    <label>Session ID</label>
                    <input type="text" id="sessionId" placeholder="留空自动创建新 Session">
                    <div style="font-size:12px;color:#888;margin-top:4px;" id="sessionHint"></div>
                </div>
                <div class="form-group" style="display:flex;gap:8px;margin-top:8px;">
                    <button class="btn" style="background:#e74c3c;padding:8px;font-size:13px;" onclick="abortRun()">中止 Run</button>
                    <button class="btn" style="background:#7f8c8d;padding:8px;font-size:13px;" onclick="clearSession()">清除 Session</button>
                </div>
            </div>
            <div class="right-panel">
                <div class="chat-area" id="chatArea">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                        </svg>
                        <p>输入消息开始对话</p>
                        <p style="font-size: 12px; margin-top: 10px;">支持 subagent 编排与队列策略</p>
                    </div>
                </div>
                <div class="input-area">
                    <div id="status" class="status status-idle">
                        <span>● 就绪</span>
                    </div>
                    <div class="form-group">
                        <textarea id="prompt" placeholder="输入你的问题...&#10;例如：帮我规划一下如何实现一个用户认证系统" rows="3"></textarea>
                    </div>
                    <button class="btn" id="sendBtn" onclick="sendMessage()">发送消息</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTurn = 0;
        let isStreaming = false;
        let currentRunId = null;

        const queueModeHints = {
            interrupt: '中断当前 run，立即开始新 run',
            followup: '当前有 run 时进入队列等待',
            steer: '把新 prompt 注入到正在进行的 run',
            drop: '当前有 run 时静默丢弃新请求',
            reject: '当前有 run 时直接拒绝并返回 quota_rejected'
        };

        marked.setOptions({ breaks: true, gfm: true });

        function renderMarkdown(el, text) {
            el.innerHTML = marked.parse(text);
        }

        const modelOptions = {
            deepseek: [
                { value: 'deepseek-v4-pro', label: 'deepseek-v4-pro' },
                { value: 'deepseek-v4-flash', label: 'deepseek-v4-flash' }
            ]
        };

        function updateModelDropdown() {
            const provider = document.getElementById('provider').value;
            const modelSelect = document.getElementById('modelId');
            modelSelect.innerHTML = '';
            modelOptions[provider].forEach(opt => {
                const option = document.createElement('option');
                option.value = opt.value;
                option.textContent = opt.label;
                modelSelect.appendChild(option);
            });
        }

        document.getElementById('provider').addEventListener('change', updateModelDropdown);
        window.addEventListener('DOMContentLoaded', updateModelDropdown);

        document.getElementById('queueMode').addEventListener('change', function () {
            document.getElementById('queueHint').textContent = queueModeHints[this.value] || '';
        });

        function setStatus(text, type = 'idle') {
            const status = document.getElementById('status');
            status.className = `status status-${type}`;
            if (type === 'streaming' || type === 'queued') {
                status.innerHTML = `<div class="spinner"></div><span>${text}</span>`;
            } else {
                status.innerHTML = `<span>${text}</span>`;
            }
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function ensureChatStarted() {
            const empty = document.getElementById('chatArea').querySelector('.empty-state');
            if (empty) empty.remove();
        }

        function addMessage(role, content) {
            ensureChatStarted();
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            const roleClass = `role-${role}`;
            const roleLabel = role === 'user' ? '👤 用户'
                : role === 'assistant' ? '🤖 助手'
                : role === 'system' ? 'ℹ️ 系统'
                : '🔧 工具';
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="role ${roleClass}">${roleLabel}</span>
                </div>
                <div class="message-content">${content}</div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return messageDiv.querySelector('.message-content');
        }

        function addTurnIndicator() {
            currentTurn++;
            ensureChatStarted();
            const chatArea = document.getElementById('chatArea');
            const turnDiv = document.createElement('div');
            turnDiv.className = 'turn-indicator';
            turnDiv.textContent = `Turn ${currentTurn}`;
            chatArea.appendChild(turnDiv);
        }

        function appendDelta(targetEl, deltaState, delta) {
            deltaState.text += delta;
            let textNode = targetEl.querySelector('.msg-text');
            if (!textNode) {
                textNode = document.createElement('div');
                textNode.className = 'msg-text';
                targetEl.appendChild(textNode);
            }
            renderMarkdown(textNode, deltaState.text);
            document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
        }

        // ----- Inline tool card -----
        function ensureInlineToolCard(container, toolCallId, toolName) {
            if (!container) return null;
            let card = container.querySelector(`[data-tool-id="${CSS.escape(toolCallId)}"]`);
            if (card) return card;
            card = document.createElement('div');
            card.className = 'inline-card tool';
            card.dataset.toolId = toolCallId;
            card.innerHTML = `
                <div class="inline-card-header">
                    <span>🔧 调用工具: <strong>${escapeHtml(toolName || '')}</strong></span>
                    <span class="badge">执行中</span>
                </div>
            `;
            container.appendChild(card);
            return card;
        }

        function completeInlineToolCard(container, toolCallId, toolName, result, isError) {
            const card = ensureInlineToolCard(container, toolCallId, toolName);
            if (!card) return;
            card.classList.remove('tool');
            card.classList.add('tool', isError ? 'error' : 'success');
            const icon = isError ? '❌' : '✅';
            const label = isError ? '工具执行失败' : '工具执行完成';
            card.innerHTML = `
                <div class="inline-card-header">
                    <span>${icon} ${label}: <strong>${escapeHtml(toolName || '')}</strong></span>
                </div>
                <div class="inline-card-body">${escapeHtml(result || '')}</div>
            `;
        }

        // ----- Inline subagent card -----
        function ensureSubagentCard(container, subagentId, payload) {
            if (!container) return null;
            let card = container.querySelector(`[data-subagent-id="${CSS.escape(subagentId)}"]`);
            if (card) return card;
            card = document.createElement('div');
            card.className = 'inline-card subagent';
            card.dataset.subagentId = subagentId;
            const role = payload && payload.role ? payload.role : 'subagent';
            const task = payload && payload.task ? payload.task : '';
            const scope = payload && payload.workspaceScope ? payload.workspaceScope : '';
            card.innerHTML = `
                <div class="inline-card-header">
                    <span>🧩 Subagent <strong>${escapeHtml(role)}</strong></span>
                    <span class="badge">${escapeHtml(scope || 'session')}</span>
                    <span class="badge" data-state="status">运行中</span>
                </div>
                <div style="font-size:12.5px;color:#666;margin-top:4px;">${escapeHtml(task)}</div>
                <div class="inline-card-body" data-role="output"></div>
            `;
            container.appendChild(card);
            return card;
        }

        function appendSubagentDelta(card, delta) {
            if (!card) return;
            const body = card.querySelector('[data-role="output"]');
            if (!body) return;
            body.textContent += delta;
            document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
        }

        function finishSubagentCard(card, success, message) {
            if (!card) return;
            card.classList.remove('subagent');
            card.classList.add('subagent', success ? 'success' : 'error');
            const badge = card.querySelector('[data-state="status"]');
            if (badge) {
                badge.textContent = success ? '已完成' : '失败';
            }
            if (message) {
                const body = card.querySelector('[data-role="output"]');
                if (body) {
                    body.textContent += (body.textContent ? '\n' : '') + message;
                }
            }
        }

        async function sendMessage() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt || isStreaming) return;

            const namespace = document.getElementById('namespace').value.trim();
            const tenantIdInput = document.getElementById('tenantId').value.trim();
            const tenantId = tenantIdInput || namespace; // 默认与 namespace 一致
            const userId = document.getElementById('userId').value.trim();
            const projectKey = document.getElementById('projectKey').value.trim();
            const provider = document.getElementById('provider').value;
            const modelId = document.getElementById('modelId').value;
            const queueMode = document.getElementById('queueMode').value;
            const systemPrompt = document.getElementById('systemPrompt').value.trim();
            const sessionId = document.getElementById('sessionId').value.trim() || null;

            if (!namespace) {
                alert('请输入 Namespace');
                return;
            }
            if (!userId) {
                alert('请输入 User ID（后端要求 X-User-Id 必填）');
                return;
            }
            if (tenantIdInput && tenantIdInput !== namespace) {
                alert('Tenant ID 必须等于 Namespace（留空则自动填充）');
                return;
            }

            addMessage('user', escapeHtml(prompt));
            document.getElementById('prompt').value = '';

            isStreaming = true;
            document.getElementById('sendBtn').disabled = true;
            setStatus('请求中...', 'streaming');

            // Track per-run state
            let assistantContentEl = null;
            const assistantDelta = { text: '' };

            try {
                const headers = { 'Content-Type': 'application/json' };
                if (tenantId) headers['X-Tenant-Id'] = tenantId;
                if (userId) headers['X-User-Id'] = userId;

                const requestBody = {
                    namespace,
                    prompt,
                    sessionId,
                    queueMode,
                    provider,
                    modelId,
                    systemPrompt: systemPrompt || null,
                    projectKey: projectKey || null
                };

                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    let boundary;
                    while ((boundary = buffer.indexOf('\n\n')) !== -1) {
                        const frame = buffer.substring(0, boundary);
                        buffer = buffer.substring(boundary + 2);

                        let dataStr = null;
                        for (const line of frame.split('\n')) {
                            if (line.startsWith('data:')) {
                                dataStr = (dataStr || '') + line.substring(5).trimStart();
                            }
                        }
                        if (!dataStr || !dataStr.trim()) continue;

                        let envelope;
                        try {
                            envelope = JSON.parse(dataStr);
                        } catch (e) {
                            console.warn('JSON parse skip:', dataStr);
                            continue;
                        }
                        handleEvent(envelope);
                    }
                }
            } catch (error) {
                setStatus('错误: ' + error.message, 'error');
                addMessage('system', '发生了错误：' + escapeHtml(error.message));
            } finally {
                isStreaming = false;
                document.getElementById('sendBtn').disabled = false;
                if (document.getElementById('status').className.includes('streaming')) {
                    setStatus('完成', 'idle');
                }
            }

            function handleEvent(envelope) {
                // envelope: { eventId, name, runId, sessionId, subagentId, timestamp, data }
                const name = envelope.name;
                const data = envelope.data || {};
                const subagentId = envelope.subagentId;

                console.log('SSE event:', name, envelope);

                // Capture sessionId/runId
                if (envelope.sessionId && !document.getElementById('sessionId').value) {
                    document.getElementById('sessionId').value = envelope.sessionId;
                    document.getElementById('sessionHint').textContent = '已自动创建';
                }
                if (envelope.runId) currentRunId = envelope.runId;

                switch (name) {
                    case 'run_started':
                        addTurnIndicator();
                        setStatus(`运行中 (run=${envelope.runId})`, 'streaming');
                        break;

                    case 'queue_updated': {
                        const decision = data.decision || '';
                        const queueSize = data.queueSize;
                        if (decision === 'ENQUEUE') {
                            setStatus(`已入队 (size=${queueSize})`, 'queued');
                            addMessage('system', `请求已入队（queueSize=${queueSize}），等待当前 run 完成`);
                        } else if (decision === 'DROP') {
                            setStatus('请求被丢弃', 'idle');
                            addMessage('system', '当前已有 run 在执行，本次请求按 drop 策略被丢弃');
                        } else if (decision === 'STEER') {
                            setStatus('已 steer 当前 run', 'idle');
                            addMessage('system', `已把本次 prompt 注入到当前 run（steered=${data.steered}）`);
                        } else {
                            setStatus(`队列决策: ${decision}`, 'idle');
                        }
                        break;
                    }

                    case 'quota_rejected':
                        setStatus('被拒绝: ' + (data.reason || ''), 'error');
                        addMessage('system', '请求被拒绝：' + escapeHtml(data.reason || 'unknown'));
                        break;

                    case 'message_start':
                        if (data.role === 'assistant') {
                            assistantContentEl = addMessage('assistant', '');
                            assistantDelta.text = '';
                        }
                        break;

                    case 'message_delta':
                        if (assistantContentEl && data.delta) {
                            appendDelta(assistantContentEl, assistantDelta, data.delta);
                        }
                        break;

                    case 'message_end':
                        // assistant message finalized
                        break;

                    case 'tool_started':
                        ensureInlineToolCard(assistantContentEl, data.toolCallId, data.toolName);
                        break;

                    case 'tool_updated':
                        // Optional partial update; current UI keeps "执行中" state
                        break;

                    case 'tool_completed':
                        completeInlineToolCard(
                            assistantContentEl,
                            data.toolCallId,
                            data.toolName,
                            data.result,
                            data.isError
                        );
                        // 如果是策略拒绝,额外高亮提示
                        if (data.isError && data.result && data.result.includes('denied by runtime policy')) {
                            const card = assistantContentEl?.querySelector(`[data-tool-id="${CSS.escape(data.toolCallId)}"]`);
                            if (card) {
                                card.style.background = '#fff3cd';
                                card.style.borderLeftColor = '#ff9800';
                                const header = card.querySelector('.inline-card-header');
                                if (header) {
                                    header.innerHTML = `<span>🚫 工具被策略拒绝: <strong>${escapeHtml(data.toolName || '')}</strong></span>`;
                                }
                            }
                        }
                        break;

                    case 'subagent_started':
                        ensureSubagentCard(assistantContentEl, subagentId, data);
                        break;

                    case 'subagent_message_delta': {
                        const card = ensureSubagentCard(assistantContentEl, subagentId, data);
                        appendSubagentDelta(card, data.delta || '');
                        break;
                    }

                    case 'subagent_tool_started': {
                        const card = ensureSubagentCard(assistantContentEl, subagentId, data);
                        if (card) {
                            const inner = card.querySelector('[data-role="output"]');
                            if (inner) {
                                inner.textContent += `\n[tool] ${data.toolName} ...`;
                            }
                        }
                        break;
                    }

                    case 'subagent_tool_completed': {
                        const card = ensureSubagentCard(assistantContentEl, subagentId, data);
                        if (card) {
                            const inner = card.querySelector('[data-role="output"]');
                            if (inner) {
                                inner.textContent += `\n[tool ${data.isError ? 'fail' : 'ok'}] ${data.toolName}`;
                            }
                        }
                        break;
                    }

                    case 'subagent_completed': {
                        const card = ensureSubagentCard(assistantContentEl, subagentId, data);
                        finishSubagentCard(card, true, data.result ? '\n=== 结果 ===\n' + data.result : null);
                        break;
                    }

                    case 'subagent_failed': {
                        const card = ensureSubagentCard(assistantContentEl, subagentId, data);
                        finishSubagentCard(card, false,
                            `[${data.failureType || 'FAILED'}] ${data.message || ''}`);
                        break;
                    }

                    case 'ack':
                        setStatus('命令已执行: ' + (data.command || ''), 'idle');
                        addMessage('system', '命令已执行：' + escapeHtml(JSON.stringify(data)));
                        break;

                    case 'run_completed':
                        setStatus('完成', 'idle');
                        break;

                    case 'run_failed':
                        setStatus(`失败: ${data.failureType || ''}`, 'error');
                        addMessage('system', `Run 失败 [${data.failureType}] ${escapeHtml(data.message || '')}`);
                        break;

                    default:
                        // Unknown event names are ignored
                        break;
                }
            }
        }

        async function abortRun() {
            const namespace = document.getElementById('namespace').value.trim();
            const sessionId = document.getElementById('sessionId').value.trim();
            if (!namespace || !sessionId) {
                alert('需要 namespace 和 sessionId 才能中止');
                return;
            }
            try {
                const headers = { 'Content-Type': 'application/json' };
                const tenantId = document.getElementById('tenantId').value.trim();
                const userId = document.getElementById('userId').value.trim();
                if (tenantId) headers['X-Tenant-Id'] = tenantId;
                if (userId) headers['X-User-Id'] = userId;
                await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({
                        namespace,
                        sessionId,
                        command: 'abort'
                    })
                });
                setStatus('已发送 abort', 'idle');
            } catch (e) {
                setStatus('abort 失败: ' + e.message, 'error');
            }
        }

        function clearSession() {
            document.getElementById('sessionId').value = '';
            document.getElementById('sessionHint').textContent = '';
            document.getElementById('chatArea').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                    </svg>
                    <p>输入消息开始对话</p>
                </div>`;
            currentTurn = 0;
            currentRunId = null;
            setStatus('就绪', 'idle');
        }

        // Enter to send
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
