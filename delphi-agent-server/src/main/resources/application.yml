spring:
#  profiles:
#    active: local-dev
   ai:
     openai:
       api-key: ${OPENAI_API_KEY:}
   config:
    import: optional:file:.env[.properties]
    application:
      name: delphi-agent-server
    data:
      mongodb:
        uri: ${MONGODB_URI:mongodb://localhost:27017/pi-agent-framework}
pi:
  execution:
    workspaces-root: ${PI_WORKSPACES_ROOT:./workspaces}
    docker:
      image: ${PI_DOCKER_IMAGE:pi-agent-sandbox:latest}
      network: ${PI_DOCKER_NETWORK:bridge}
      read-only-rootfs: ${PI_DOCKER_READONLY:true}
      cpu-quota: ${PI_DOCKER_CPU_QUOTA:50000}
      memory-limit: ${PI_DOCKER_MEMORY:256m}
      pids-limit: ${PI_DOCKER_PIDS:100}
      tmpfs:
        tmp: ${PI_DOCKER_TMPFS_TMP:512m}
        var-tmp: ${PI_DOCKER_TMPFS_VAR_TMP:128m}
        run: ${PI_DOCKER_TMPFS_RUN:64m}
  tool-policy:
    # ORCHESTRATOR 角色是否启用严格模式
    # false（默认）：主代理拥有全部工具类目（READONLY / MUTATING / EXECUTABLE / INSTRUCTIONAL / ORCHESTRATION）
    #                适合单机演示、可信环境、快速原型
    # true：主代理仅能 READONLY / INSTRUCTIONAL / ORCHESTRATION，
    #       MUTATING / EXECUTABLE 必须通过 spawn CODER/TESTER subagent 完成
    #       适合多租户生产环境、零信任架构
    orchestrator-strict: ${PI_TOOL_POLICY_ORCHESTRATOR_STRICT:false}
  resources:
    skills-dirs: ${PI_AGENT_SKILLS_DIRS:./skills,${user.home}/.codex/skills}
    prompts-dirs: ${PI_AGENT_PROMPTS_DIRS:./prompts}
    resources-dirs: ${PI_AGENT_RESOURCES_DIRS:./resources}
  models:
    - id: deepseek-v4-pro
      name: deepseek-v4-pro
      api: spring-ai-deepseek
      provider: deepseek
      base-url: https://api.deepseek.com/anthropic
      reasoning: false
      input: [text]
      context-window: 1048576
      max-tokens: 262144
    - id: deepseek-v4-flash
      name: deepseek-v4-flash
      api: spring-ai-deepseek
      provider: deepseek
      base-url: https://api.deepseek.com/anthropic
      reasoning: false
      input: [text]
      context-window: 1048576
      max-tokens: 262144
  defaults:
    provider: deepseek
    model-id: deepseek-v4-pro
  session:
    max-sessions: ${PI_SESSION_MAX:2000}
    idle-ttl-hours: ${PI_SESSION_IDLE_TTL_HOURS:24}
    reap-interval-minutes: ${PI_SESSION_REAP_MINUTES:5}
  compaction:
    context-window-ratio: 0.8
    max-messages: 60
    default-keep-count: 20
  planning:
    timeout-seconds: ${PI_PLANNING_TIMEOUT:45}
  tools:
    builtin:
      enabled: ${PI_TOOLS_BUILTIN_ENABLED:true}
      available: [read, bash, edit, write, grep, find, ls]
      default-enabled: [read, bash, edit, write]
      read:
        max-lines: ${PI_TOOLS_READ_MAX_LINES:2000}
        max-bytes: ${PI_TOOLS_READ_MAX_BYTES:51200}
      bash:
        default-timeout-seconds: ${PI_TOOLS_BASH_TIMEOUT_SECONDS:1800}
        max-lines: ${PI_TOOLS_BASH_MAX_LINES:2000}
        max-bytes: ${PI_TOOLS_BASH_MAX_BYTES:51200}
      grep:
        default-limit: ${PI_TOOLS_GREP_DEFAULT_LIMIT:100}
        max-line-length: ${PI_TOOLS_GREP_MAX_LINE_LENGTH:500}
        max-bytes: ${PI_TOOLS_GREP_MAX_BYTES:51200}
      find:
        default-limit: ${PI_TOOLS_FIND_DEFAULT_LIMIT:1000}
        max-bytes: ${PI_TOOLS_FIND_MAX_BYTES:51200}
      ls:
        default-limit: ${PI_TOOLS_LS_DEFAULT_LIMIT:500}
        max-bytes: ${PI_TOOLS_LS_MAX_BYTES:51200}
  api-keys:
    - DEEPSEEK_API_KEY
  rate-limit:
    enabled: true
    default-rpm: 60
  quota:
    enabled: true
    defaults:
      max-concurrent-sessions: 50
      daily-token-limit: 1000000
      cpu-quota: 50000
      memory-limit: 256m
      pids-limit: 100
    overrides:
      premium-tenant:
        max-concurrent-sessions: 200
        daily-token-limit: 10000000
        cpu-quota: 100000
        memory-limit: 512m
        pids-limit: 200
  audit:
    enabled: true
  metering:
    enabled: true
    flush-interval-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

server:
  port: ${PORT:8080}
