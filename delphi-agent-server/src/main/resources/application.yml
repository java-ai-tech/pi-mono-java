spring:
#  profiles:
#    active: local-dev
  config:
    import: optional:file:.env[.properties]
  application:
    name: delphi-agent-server
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/pi-agent-framework}
pi:
  resources:
    skills-dirs: ${PI_AGENT_SKILLS_DIRS:./skills,${user.home}/.codex/skills}
    prompts-dirs: ${PI_AGENT_PROMPTS_DIRS:./prompts}
    resources-dirs: ${PI_AGENT_RESOURCES_DIRS:./resources}
  models:
    - id: deepseek-chat
      name: deepseek-chat
      api: spring-ai-deepseek
      provider: deepseek
      base-url: https://api.deepseek.com
      reasoning: false
      input: [text]
      context-window: 64000
      max-tokens: 8192
    - id: deepseek-reasoner
      name: deepseek-reasoner
      api: spring-ai-deepseek
      provider: deepseek
      base-url: https://api.deepseek.com
      reasoning: true
      input: [text]
      context-window: 64000
      max-tokens: 8192
  defaults:
    provider: deepseek
    model-id: deepseek-chat
  session:
    max-sessions: ${PI_SESSION_MAX:2000}
    idle-ttl-hours: ${PI_SESSION_IDLE_TTL_HOURS:24}
    reap-interval-minutes: ${PI_SESSION_REAP_MINUTES:5}
  compaction:
    context-window-ratio: 0.8
    max-messages: 60
    default-keep-count: 20
  planning:
    timeout-seconds: ${PI_PLANNING_TIMEOUT:45}
  tools:
    builtin:
      enabled: ${PI_TOOLS_BUILTIN_ENABLED:true}
      available: [read, bash, edit, write, grep, find, ls]
      default-enabled: [read, bash, edit, write]
      read:
        max-lines: ${PI_TOOLS_READ_MAX_LINES:2000}
        max-bytes: ${PI_TOOLS_READ_MAX_BYTES:51200}
      bash:
        default-timeout-seconds: ${PI_TOOLS_BASH_TIMEOUT_SECONDS:1800}
        max-lines: ${PI_TOOLS_BASH_MAX_LINES:2000}
        max-bytes: ${PI_TOOLS_BASH_MAX_BYTES:51200}
      grep:
        default-limit: ${PI_TOOLS_GREP_DEFAULT_LIMIT:100}
        max-line-length: ${PI_TOOLS_GREP_MAX_LINE_LENGTH:500}
        max-bytes: ${PI_TOOLS_GREP_MAX_BYTES:51200}
      find:
        default-limit: ${PI_TOOLS_FIND_DEFAULT_LIMIT:1000}
        max-bytes: ${PI_TOOLS_FIND_MAX_BYTES:51200}
      ls:
        default-limit: ${PI_TOOLS_LS_DEFAULT_LIMIT:500}
        max-bytes: ${PI_TOOLS_LS_MAX_BYTES:51200}
  api-keys:
    - DEEPSEEK_API_KEY
  rate-limit:
    enabled: true
    default-rpm: 60
  quota:
    enabled: true
    defaults:
      max-concurrent-sessions: 50
      daily-token-limit: 1000000
      cpu-quota: 50000
      memory-limit: 256m
      pids-limit: 100
    overrides:
      premium-tenant:
        max-concurrent-sessions: 200
        daily-token-limit: 10000000
        cpu-quota: 100000
        memory-limit: 512m
        pids-limit: 200
  audit:
    enabled: true
  metering:
    enabled: true
    flush-interval-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

server:
  port: ${PORT:8080}
